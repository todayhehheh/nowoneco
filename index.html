<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지구를 시언하게</title>

  <!-- SEO / 카카오 공유 메타태그 -->
  <meta name="description" content="노원구꿈드림 환경동아리가 만든 환경 실천 페이지예요. 오늘 미션 하나만 해봐요!">
  <meta property="og:title" content="지구를 시언하게">
  <meta property="og:description" content="저희가 어른들한테 부탁이 있어요. 오늘 미션 하나만 해봐요 🌱">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://todayhehheh.github.io/nowoneco/">
  <meta name="theme-color" content="#ffffff">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="지구를 시언하게">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gd: #2c4a2e;
      --gm: #4a7a4e;
      --gl: #7aad56;
      --cream: #faf7f2;
      --bg: #f2efe8;
      --td: #1e2e1f;
      --tm: #6b8c6d;
      --nav-h: 64px;
      --hdr-h: 58px;
      --grad-hero: linear-gradient(150deg, #1a3320 0%, #2e5c32 60%, #3d6b40 100%);
      --shadow-card: 0 2px 16px rgba(44,74,46,0.07), 0 1px 3px rgba(0,0,0,0.04);
      --shadow-hero: 0 10px 32px rgba(44,74,46,0.24), 0 2px 8px rgba(44,74,46,0.1);
    }

    html { height: 100%; }

    body {
      height: 100%;
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--td);
      max-width: 480px;
      margin: 0 auto;
      overflow: hidden;
      position: relative;
    }

    /* ══ STORY ══════════════════════════════════════ */
    #story {
      position: absolute;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      background: var(--gd);
      transition: opacity 0.4s ease;
    }

    .s-progress {
      display: flex;
      gap: 5px;
      padding: 48px 16px 0;
      flex-shrink: 0;
      position: relative;
      z-index: 2;
    }
    .s-seg {
      flex: 1; height: 3px;
      border-radius: 2px;
      background: rgba(255,255,255,0.28);
      overflow: hidden;
    }
    .s-seg-fill {
      height: 100%; width: 0;
      background: #fff;
      transition: width 0.25s ease;
    }
    .s-seg.done .s-seg-fill { width: 100%; transition: none; }
    .s-seg.active .s-seg-fill { width: 100%; }

    .s-skip {
      position: absolute;
      top: 40px; right: 16px;
      color: rgba(255,255,255,0.55);
      font-size: 13px;
      background: none; border: none; cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      padding: 8px; z-index: 10;
    }

    #s-content {
      flex: 1;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .s-slide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 26px 36px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .s-slide.active { opacity: 1; pointer-events: auto; }

    /* blobs */
    .blob {
      position: absolute;
      border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
      opacity: 0.1;
      pointer-events: none;
      animation: blob-m 9s ease-in-out infinite;
    }
    @keyframes blob-m {
      0%,100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; transform: scale(1); }
      33%      { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; transform: scale(1.1); }
      66%      { border-radius: 50% 30% 50% 70% / 30% 70% 30% 60%; transform: scale(0.95); }
    }

    /* text slides */
    .s-badge {
      display: inline-block;
      border: 1px solid rgba(143,188,106,0.45);
      color: var(--gl);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 11px;
      letter-spacing: 1.5px;
      margin-bottom: 20px;
    }
    .s-title {
      font-family: 'Nanum Pen Script', cursive;
      font-size: 58px; color: #fff;
      line-height: 1.15; margin-bottom: 14px;
    }
    .s-sub {
      font-family: 'Nanum Pen Script', cursive;
      font-size: 24px;
      color: rgba(255,255,255,0.78);
      line-height: 1.65;
    }

    /* photo slides */
    .s-photo-wrap {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .s-photo-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .s-photo-ph {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px;
    }
    .s-photo-ph-club  { background: linear-gradient(150deg, #243c28, #3d6b40); }
    .s-photo-ph-letter {
      background: linear-gradient(160deg, #2e2416, #4a3820);
      position: relative; overflow: hidden;
    }
    .s-photo-ph-letter::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        transparent, transparent 31px,
        rgba(255,220,140,0.1) 31px, rgba(255,220,140,0.1) 32px
      );
    }
    .s-photo-ph-icon { font-size: 52px; opacity: 0.5; position: relative; }
    .s-photo-ph-text {
      font-family: 'Nanum Pen Script', cursive;
      font-size: 26px; color: rgba(255,255,255,0.65);
      position: relative;
    }
    .s-photo-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 180px;
      background: linear-gradient(transparent, rgba(0,0,0,0.55));
      pointer-events: none;
    }
    .s-photo-caption {
      position: absolute;
      bottom: 44px; left: 24px; right: 24px;
      font-family: 'Nanum Pen Script', cursive;
      font-size: 22px;
      color: rgba(255,255,255,0.88);
      pointer-events: none;
    }

    /* join slide */
    .s-steps { display: flex; flex-direction: column; gap: 12px; width: 100%; }
    .s-step {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex; align-items: center; gap: 13px;
      text-align: left;
    }
    .s-step-num {
      flex-shrink: 0; width: 30px; height: 30px;
      background: var(--gl); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; color: #fff;
    }
    .s-step-text {
      font-family: 'Nanum Pen Script', cursive;
      font-size: 20px; color: #fff; line-height: 1.4;
    }
    .s-start-btn {
      margin-top: 28px;
      padding: 16px 44px;
      background: #fff; color: var(--gd);
      border: none; border-radius: 32px;
      font-size: 15px; font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(0,0,0,0.14);
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .s-start-btn:active { transform: scale(0.96); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

    /* ══ APP ════════════════════════════════════════ */
    #app {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    #app.visible { display: flex; }
    #app.faded { opacity: 1; }

    /* Header */
    #app-hdr {
      flex-shrink: 0;
      height: var(--hdr-h);
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0,0,0,0.04);
      box-shadow: 0 1px 0 rgba(0,0,0,0.03), 0 4px 20px rgba(44,74,46,0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      position: relative;
      z-index: 10;
    }
    .hdr-logo {
      font-family: 'Nanum Pen Script', cursive;
      font-size: 26px;
      color: var(--gd);
      line-height: 1;
      display: flex; align-items: center; gap: 7px;
    }
    .hdr-logo-dot {
      width: 7px; height: 7px;
      background: var(--gl);
      border-radius: 50%;
      flex-shrink: 0;
      margin-bottom: 1px;
      box-shadow: 0 0 0 3px rgba(122,173,86,0.2);
    }
    .hdr-date {
      font-size: 12px; font-weight: 500;
      color: var(--gd);
      background: rgba(122,173,86,0.12);
      border-radius: 20px;
      padding: 5px 13px;
      letter-spacing: -0.2px;
    }

    /* Main scrollable area */
    #app-main {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    .tab-pane {
      display: none;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }
    .tab-pane.active { display: block; }
    .pane-pad { padding: 20px 18px 90px; }

    /* Section heading inside panes */
    .pane-heading {
      font-family: 'Nanum Pen Script', cursive;
      font-size: 34px;
      color: var(--gd);
      margin-bottom: 3px;
      letter-spacing: -0.5px;
    }
    .pane-sub {
      font-size: 13px;
      color: var(--tm);
      margin-bottom: 20px;
      font-weight: 400;
    }

    /* Bottom Nav */
    #bot-nav {
      flex-shrink: 0;
      height: var(--nav-h);
      background: #ffffff;
      border-top: 1px solid rgba(0,0,0,0.08);
      box-shadow: 0 -2px 12px rgba(44,74,46,0.06);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }
    .nav-btn {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px; border: none; background: none;
      cursor: pointer; color: #b8b2ab;
      transition: color 0.18s;
      font-family: 'Noto Sans KR', sans-serif;
      -webkit-tap-highlight-color: transparent;
      -webkit-appearance: none;
      appearance: none;
      outline: none;
    }
    .nav-btn.active { color: var(--gd); }
    .nav-icon { width: 22px; height: 22px; }
    .nav-label { font-size: 10px; font-weight: 600; }

    /* ── MISSION TAB ─────────────────────────── */
    .today-card {
      background: var(--grad-hero);
      border-radius: 24px;
      padding: 18px 20px 0;
      margin-bottom: 18px;
      position: relative;
      overflow: hidden;
      box-shadow: var(--shadow-hero);
    }
    .today-card::before {
      content: '';
      position: absolute;
      width: 120px; height: 120px;
      background: rgba(122,173,86,0.12);
      border-radius: 50%;
      top: -30px; left: -30px;
    }
    .today-card::after {
      content: '';
      position: absolute;
      width: 180px; height: 180px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
      bottom: -60px; right: -40px;
    }
    .tc-label { font-size: 11px; color: rgba(255,255,255,0.5); margin-bottom: 8px; letter-spacing: 1px; font-weight: 500; }
    .tc-inner { display: flex; align-items: flex-end; gap: 12px; }
    .tc-text { flex: 1; min-width: 0; padding-bottom: 18px; }
    .tc-title {
      font-family: 'Nanum Pen Script', cursive;
      font-size: 42px; color: #fff; margin-bottom: 6px; line-height: 1.05;
    }
    .tc-theme { font-size: 16px; color: rgba(160,210,120,0.95); font-weight: 600; letter-spacing: 0.2px; }
    .tc-img {
      flex-shrink: 0;
      width: 110px; height: 110px;
      object-fit: contain;
      object-position: bottom;
      display: block;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.18));
    }

    .day-tabs {
      display: flex; gap: 7px;
      overflow-x: auto; scrollbar-width: none;
      margin-bottom: 18px;
    }
    .day-tabs::-webkit-scrollbar { display: none; }
    .day-tab {
      flex-shrink: 0;
      padding: 9px 17px;
      border-radius: 22px;
      border: 1.5px solid #e2ddd5;
      background: #fff;
      color: #aaa;
      font-size: 13px; font-family: 'Noto Sans KR', sans-serif; font-weight: 500;
      cursor: pointer; transition: all 0.2s;
    }
    .day-tab.active {
      background: var(--gd); border-color: var(--gd); color: #fff;
      box-shadow: 0 4px 16px rgba(44,74,46,0.28);
    }

    .mission-card {
      background: #fff;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }
    .mc-header {
      background: var(--grad-hero);
      padding: 20px 22px 18px;
      position: relative;
      overflow: hidden;
    }
    .mc-header::after {
      content: '';
      position: absolute;
      width: 140px; height: 140px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
      bottom: -50px; right: -30px;
    }
    .mc-theme {
      font-family: 'Nanum Pen Script', cursive;
      font-size: 26px; color: #fff; line-height: 1.2;
    }
    .mc-body { padding: 6px 20px 18px; }
    .mc-item {
      display: flex; gap: 14px; align-items: flex-start;
      padding: 16px 0;
      border-bottom: 1px solid #f3ede7;
    }
    .mc-item:last-child { border-bottom: none; }
    .mc-num {
      flex-shrink: 0; width: 24px; height: 24px;
      background: linear-gradient(135deg, var(--gd), var(--gm));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #fff;
      margin-top: 2px;
    }
    .mc-content { flex: 1; }
    .mc-text { font-size: 14px; line-height: 1.75; color: var(--td); margin-bottom: 6px; }
    .mc-comment {
      font-family: 'Nanum Pen Script', cursive;
      font-size: 18px; color: var(--tm);
      opacity: 0.82;
      padding-left: 2px;
    }

    /* ── FEED TAB ──────────────────────────── */
    .posts-grid {
      display: flex; flex-direction: column; gap: 16px;
    }
    .post-card {
      border-radius: 20px; overflow: hidden;
      background: #fff;
      box-shadow: var(--shadow-card);
      transition: transform 0.13s;
    }
    .post-card:active { transform: scale(0.985); }
    .post-img-wrap {
      overflow: hidden;
      background: #f4f6f4;
      display: flex; align-items: center; justify-content: center;
    }
    .post-img { width: 100%; height: auto; display: block; }
    .post-text {
      padding: 12px 14px 14px;
      font-family: 'Nanum Pen Script', cursive;
      font-size: 19px; line-height: 1.5; color: var(--td);
    }
    .board-empty {
      text-align: center; padding: 72px 20px;
      color: var(--tm); font-size: 14px; line-height: 2;
    }
    .board-empty-icon { font-size: 48px; margin-bottom: 14px; }

    .feed-upload-btn {
      display: block; width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--gd) 0%, var(--gm) 100%);
      color: #fff;
      border: none; border-radius: 16px;
      font-size: 15px; font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer; margin-bottom: 18px;
      box-shadow: 0 4px 16px rgba(44,74,46,0.28);
      transition: opacity 0.15s, transform 0.12s;
      letter-spacing: 0.2px;
    }
    .feed-upload-btn:active { opacity: 0.88; transform: scale(0.98); }

    /* ── GALLERY TAB ─────────────────────────── */
    .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .gallery-item {
      border-radius: 18px; overflow: hidden; position: relative;
      cursor: pointer;
      box-shadow: var(--shadow-card);
      transition: transform 0.13s;
      background: #eef2ee;
    }
    .gallery-item:active { transform: scale(0.965); }
    .gallery-ph {
      width: 100%; aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: 34px;
      background: linear-gradient(135deg, #c8deca, #9ecb7c);
    }
    .gallery-img { width: 100%; height: auto; display: block; }
    .gallery-cap {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 20px 10px 10px;
      background: linear-gradient(transparent, rgba(14,36,16,0.72));
      font-family: 'Nanum Pen Script', cursive;
      font-size: 17px; color: #fff; line-height: 1.3;
    }

    /* ── ABOUT TAB ────────────────────────────── */
    .about-hero {
      background: var(--grad-hero);
      border-radius: 24px;
      padding: 34px 24px;
      text-align: center;
      margin-bottom: 16px;
      box-shadow: var(--shadow-hero);
    }
    .about-title {
      font-family: 'Nanum Pen Script', cursive;
      font-size: 34px; color: #fff; margin-bottom: 18px;
    }
    .about-text {
      font-family: 'Nanum Pen Script', cursive;
      font-size: 22px; color: rgba(255,255,255,0.8); line-height: 1.9;
    }
    .about-chip {
      display: inline-block;
      border: 1px solid rgba(122,173,86,0.45);
      color: rgba(122,173,86,0.9);
      border-radius: 20px; padding: 7px 18px;
      font-size: 12px; margin-top: 20px; letter-spacing: 0.3px;
    }
    .about-row {
      background: #fff;
      border-radius: 18px;
      padding: 17px 20px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: var(--shadow-card);
      cursor: pointer;
      font-size: 14px; color: var(--td);
      transition: transform 0.13s;
    }
    .about-row:active { transform: scale(0.98); }
    .about-row + .about-row { margin-top: 10px; }
    .about-row-icon { font-size: 18px; color: var(--tm); }

    /* ══ UPLOAD SHEET ═══════════════════════════ */
    #upload-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.52);
      z-index: 200;
      max-width: 480px; margin: 0 auto;
      align-items: flex-end;
    }
    #upload-overlay.open { display: flex; }

    #upload-sheet {
      background: #fff;
      border-radius: 22px 22px 0 0;
      padding: 6px 20px 30px;
      width: 100%;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 1.0, 0.58, 1);
    }
    #upload-overlay.open #upload-sheet { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px;
      background: #e0dbd5; border-radius: 2px;
      margin: 10px auto 18px;
    }
    .sheet-title { font-size: 16px; font-weight: 700; color: var(--gd); margin-bottom: 16px; }

    .upload-drop {
      width: 100%; min-height: 160px;
      border-radius: 13px;
      border: 2px dashed #ccc;
      background: var(--cream);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; overflow: hidden;
      margin-bottom: 12px; position: relative;
    }
    .upload-drop:hover { border-color: var(--gl); }
    .upload-drop img {
      width: 100%; height: auto; display: none;
      border-radius: 11px;
    }
    .upload-hint { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .upload-hint-icon { font-size: 34px; }
    .upload-hint-text { font-size: 12px; color: var(--tm); }

    input[type="file"] { display: none; }

    .upload-textarea {
      width: 100%;
      border: 1.5px solid #ddd;
      border-radius: 11px;
      padding: 11px;
      font-family: 'Nanum Pen Script', cursive;
      font-size: 20px;
      resize: none; outline: none;
      color: var(--td); background: transparent;
      transition: border-color 0.2s;
    }
    .upload-textarea:focus { border-color: var(--gl); }
    .char-count { font-size: 11px; color: var(--tm); text-align: right; margin: 4px 0 13px; }

    .btn-primary {
      width: 100%; padding: 15px;
      background: linear-gradient(135deg, #2c4a2e 0%, #3d6b40 100%);
      color: #fff;
      border: none; border-radius: 14px;
      font-size: 15px; font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer; transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 0 4px 14px rgba(44,74,46,0.28);
    }
    .btn-primary:active { transform: scale(0.98); box-shadow: 0 2px 6px rgba(44,74,46,0.2); }
    .btn-primary:disabled { background: #c8c3bc; cursor: not-allowed; box-shadow: none; }
    .upload-notice { font-size: 11px; color: var(--tm); text-align: center; margin-top: 9px; }

    /* ══ ADMIN PANEL ════════════════════════════ */
    #admin-panel {
      display: none;
      position: fixed; inset: 0;
      max-width: 480px; margin: 0 auto;
      background: rgba(0,0,0,0.7);
      z-index: 300; overflow-y: auto; padding: 20px;
    }
    #admin-panel.open { display: flex; flex-direction: column; }
    .admin-box {
      background: #fff; border-radius: 20px;
      padding: 24px 18px; width: 100%; margin: auto;
      position: relative;
    }
    .admin-close {
      position: absolute; top: 14px; right: 14px;
      background: none; border: none; font-size: 20px;
      cursor: pointer; color: #888;
    }

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastT;

// ══════════════════════════════════════════════
// 슬라이드 순서: hero → photo(동아리 사진) → letter(손편지) → join
const SLIDES = ['hero', 'photo', 'letter', 'join'];
let curSlide = 0;

function initStory() {
  if (localStorage.getItem('story_done') || window.location.hash === '#admin') {
    startApp(false); return;
  }

  const prog = document.getElementById('s-progress');
  SLIDES.forEach((_, i) => {
    const seg = document.createElement('div');
    seg.className = 's-seg';
    seg.id = `ss${i}`;
    seg.innerHTML = '<div class="s-seg-fill"></div>';
    prog.appendChild(seg);
  });

  document.getElementById('s-skip').addEventListener('click', () => startApp(true));

  const sCont = document.getElementById('s-content');
  let _sx = 0;
  sCont.addEventListener('touchstart', e => { _sx = e.touches[0].clientX; }, { passive: true });
  sCont.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - _sx;
    if (Math.abs(dx) > 40) { goSlide(dx < 0 ? curSlide + 1 : curSlide - 1); }
  }, { passive: true });
  sCont.addEventListener('click', e => {
    if (e.target.closest('button')) return;
    const rect = sCont.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    goSlide(ratio < 0.3 ? curSlide - 1 : curSlide + 1);
  });

  goSlide(0);
}

function goSlide(idx) {
  if (idx >= SLIDES.length) { startApp(true); return; }
  if (idx < 0) idx = 0;
  curSlide = idx;

  SLIDES.forEach((_, i) => {
    const seg = document.getElementById(`ss${i}`);
    seg.classList.toggle('done', i < idx);
    seg.classList.toggle('active', i === idx);
  });

  const bgs = { hero:'#2c4a2e', photo:'#1e3422', letter:'#2a1e10', join:'#3d6b40' };
  document.getElementById('story').style.background = bgs[SLIDES[idx]];

  renderSlide(SLIDES[idx]);
}

function startApp(animate) {
  localStorage.setItem('story_done', '1');
  const story = document.getElementById('story');

  app.classList.add('visible');

  if (animate) {
    story.style.opacity = '0';
    story.style.pointerEvents = 'none';
    setTimeout(() => { story.style.display = 'none'; app.style.opacity = '1'; }, 500);
  } else {
    story.style.display = 'none';
    app.style.opacity = '1';
  }
}

// ── GALLERY (Supabase에서 불러오기, 없으면 하드코딩 fallback)
async function initGallery() {
  const thisYear = String(new Date().getFullYear());
  const cCont = document.getElementById('gallery-container-current');
  const pCont = document.getElementById('gallery-container-prev');
  const loader = '<div class="loader"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>';
  cCont.innerHTML = loader; pCont.innerHTML = loader;

  const fallback = galleryItems.map(i => ({ image_url: i.src || null, caption: i.caption, _emoji: i.emoji }));

  if (!sb) {
    renderGalleryGrid(cCont, fallback);
    renderGalleryGrid(pCont, []);
    return;
  }

  try {
    const { data, error } = await sb
      .from('gallery')
      .select('id, image_url, caption, activity_date')
      .order('activity_date', { ascending: false });
    if (error) throw error;

    if (!data || data.length === 0) {
      renderGalleryGrid(cCont, fallback);
      renderGalleryGrid(pCont, []);
      return;
    }

    const cur  = data.filter(i => i.activity_date && i.activity_date.startsWith(thisYear));
    const prev = data.filter(i => !i.activity_date || !i.activity_date.startsWith(thisYear));

    renderGalleryGrid(cCont, cur.length > 0 ? cur : fallback);
    renderGalleryGrid(pCont, prev);
  } catch(e) {
    renderGalleryGrid(cCont, fallback);
    renderGalleryGrid(pCont, []);
  }
}

function renderGalleryGrid(container, items) {
  if (!items || items.length === 0) {
    const isPrev = container.id === 'gallery-container-prev';
    container.innerHTML = `<div class="gallery-empty">${isPrev ? '기록된 이전 활동이 없어요 🌿<br>올해 열심히 활동하면<br>내년에 여기 쌓여요!' : '아직 활동 사진이 없어요 🌱'}</div>`;
    return;
  }
  const grid = document.createElement('div');
  grid.className = 'gallery-grid';
  items.forEach(item => {
    const el = document.createElement('div');
    el.className = 'gallery-item';
    const dateStr = item.activity_date
      ? `<div style="position:absolute;top:8px;right:8px;background:rgba(0,0,0,0.38);color:#fff;font-size:14px;border-radius:8px;padding:2px 8px;font-family:'Nanum Pen Script',cursive">${item.activity_date}</div>`
      : '';
    if (item.image_url) {
      el.innerHTML = `<img class="gallery-img" src="${item.image_url}" alt="${esc(item.caption)}" loading="lazy"
        onerror="this.parentNode.innerHTML='<div class=\\'gallery-ph\\'>🌿</div>'">
        ${dateStr}
        <div class="gallery-cap">${esc(item.caption)}</div>`;
      el.querySelector('.gallery-img').addEventListener('click', () => {
        window._lightboxOpen && window._lightboxOpen(item.image_url);
      });
    } else {
      el.innerHTML = `<div class="gallery-ph">${item._emoji || '🌿'}</div>
        <div class="gallery-cap">${esc(item.caption)}</div>`;
    }
    grid.appendChild(el);
  });
  container.innerHTML = '';
  container.appendChild(grid);
}

// ── UPLOAD
function initUpload() {
  const overlay  = document.getElementById('upload-overlay');
  const fileInput = document.getElementById('file-input');
  const prevImg  = document.getElementById('preview-img');
  const hint     = document.getElementById('drop-hint');
  const textarea  = document.getElementById('upload-text');
  const counter  = document.getElementById('char-count');
  const submitBtn = document.getElementById('submit-btn');
  let file = null;

  document.getElementById('feed-upload-btn').addEventListener('click', () => overlay.classList.add('open'));
  overlay.addEventListener('click', e => { if (e.target === overlay) closeSheet(); });

  function closeSheet() { overlay.classList.remove('open'); }

  fileInput.addEventListener('change', async e => {
    const raw = e.target.files[0];
    if (!raw) return;
    // 10MB 초과 시 경고만 (압축 후 올라가므로 허용)
    if (raw.size > 30 * 1024 * 1024) { toast('30MB 이하 파일만 선택해주세요.'); return; }
    submitBtn.textContent = '이미지 준비 중...';
    file = await compressImage(raw);
    prevImg.src = URL.createObjectURL(file);
    prevImg.style.display = 'block';
    hint.style.display = 'none';
    submitBtn.textContent = '올리기';
    check();
  });

  textarea.addEventListener('input', () => { counter.textContent = textarea.value.length; check(); });

  function check() {
    submitBtn.disabled = !(file && textarea.value.trim().length > 0);
  }

  submitBtn.addEventListener('click', async () => {
    if (!file || !textarea.value.trim()) return;
    if (!sb) { toast('Supabase 설정이 필요해요!'); return; }
    submitBtn.disabled = true; submitBtn.textContent = '올리는 중...';
    try {
      const name = `${Date.now()}.jpg`;
      const { error: se } = await sb.storage.from('post-images').upload(name, file, { cacheControl:'3600', upsert:false });
      if (se) throw se;
      const { data: ud } = sb.storage.from('post-images').getPublicUrl(name);
      const { error: de } = await sb.from('posts').insert({ text: textarea.value.trim(), image_url: ud.publicUrl, status:'pending' });
      if (de) throw de;
      file = null; fileInput.value = '';
      prevImg.src = ''; prevImg.style.display = 'none';
      hint.style.display = 'flex';
      textarea.value = ''; counter.textContent = '0';
      submitBtn.textContent = '올리기'; submitBtn.disabled = true;
      closeSheet();
      toast('올렸어요! 검토 후 게시될 거예요 🌿');
    } catch(e) {
      console.error(e);
      toast(friendlyError(e));
      submitBtn.disabled = false; submitBtn.textContent = '올리기';
    }
  });
}

// ── GALLERY ADMIN
function initGalleryAdmin() {
  const toggle   = document.getElementById('gallery-add-toggle');
  const formWrap = document.getElementById('gallery-form-wrap');
  const fileInput = document.getElementById('gallery-file');
  const preview  = document.getElementById('gallery-preview');
  const hint     = document.getElementById('gallery-hint');
  const dateInput = document.getElementById('gallery-date');
  const capInput  = document.getElementById('gallery-caption');
  const saveBtn   = document.getElementById('gallery-save-btn');
  let gFile = null;

  // 오늘 날짜 기본값
  dateInput.value = new Date().toISOString().slice(0, 10);

  toggle.addEventListener('click', () => {
    const open = formWrap.style.display === 'block';
    formWrap.style.display = open ? 'none' : 'block';
    toggle.textContent = open ? '＋ 새 활동 추가' : '✕ 닫기';
  });

  fileInput.addEventListener('change', async e => {
    const raw = e.target.files[0];
    if (!raw) return;
    preview.src = URL.createObjectURL(raw);
    preview.style.display = 'block';
    hint.style.display = 'none';
    saveBtn.textContent = '이미지 준비 중...';
    gFile = await compressImage(raw);
    saveBtn.textContent = '저장하기';
    checkGalleryForm();
  });

  [capInput, dateInput].forEach(el => el.addEventListener('input', checkGalleryForm));

  function checkGalleryForm() {
    saveBtn.disabled = !(gFile && capInput.value.trim());
  }

  saveBtn.addEventListener('click', async () => {
    if (!gFile || !capInput.value.trim()) return;
    if (!sb) { toast('Supabase 설정이 필요해요!'); return; }

    saveBtn.disabled = true; saveBtn.textContent = '저장 중...';
    try {
      const ext  = gFile.name.split('.').pop() || 'jpg';
      const name = `gallery_${Date.now()}.${ext}`;
      const { error: se } = await sb.storage.from('gallery-images').upload(name, gFile, { cacheControl:'3600', upsert:false });
      if (se) throw se;

      const { data: ud } = sb.storage.from('gallery-images').getPublicUrl(name);
      const { error: de } = await sb.from('gallery').insert({
        image_url:     ud.publicUrl,
        caption:       capInput.value.trim(),
        activity_date: dateInput.value || null,
      });
      if (de) throw de;

      // 폼 초기화
      gFile = null; fileInput.value = '';
      preview.src = ''; preview.style.display = 'none';
      hint.style.display = 'flex';
      capInput.value = '';
      dateInput.value = new Date().toISOString().slice(0, 10);
      saveBtn.textContent = '저장하기'; saveBtn.disabled = true;
      formWrap.style.display = 'none';
      toggle.textContent = '＋ 새 활동 추가';

      toast('갤러리에 추가했어요 🌿');
      loadGalleryAdmin();
      initGallery(); // 갤러리 탭도 새로고침
    } catch(e) {
      console.error(e);
      toast('저장 중 오류가 났어요 😅');
      saveBtn.disabled = false; saveBtn.textContent = '저장하기';
    }
  });

  loadGalleryAdmin();
}

async function loadGalleryAdmin() {
  const list = document.getElementById('gallery-admin-list');
  if (!sb) {
    list.innerHTML = '<div class="gallery-empty">Supabase 설정이 필요해요.</div>';
    return;
  }
  list.innerHTML = '<div class="loader"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>';
  try {
    const { data, error } = await sb
      .from('gallery').select('*')
      .order('activity_date', { ascending: false });
    if (error) throw error;

    if (!data || data.length === 0) {
      list.innerHTML = '<div class="gallery-empty">아직 등록된 활동이 없어요.<br>위에서 추가해주세요!</div>';
      return;
    }

    list.innerHTML = '';
    data.forEach(item => {
      const row = document.createElement('div');
      row.className = 'gallery-admin-item';

      const thumb = document.createElement('div');
      thumb.className = 'gallery-admin-thumb';
      if (item.image_url) {
        thumb.innerHTML = `<img src="${item.image_url}" alt="" loading="lazy">`;
      } else {
        thumb.textContent = '🌿';
      }

      const info = document.createElement('div');
      info.className = 'gallery-admin-info';
      info.innerHTML = `
        <div class="gallery-admin-date">${item.activity_date || '날짜 없음'}</div>
        <div class="gallery-admin-cap">${esc(item.caption)}</div>`;

      const delBtn = document.createElement('button');
      delBtn.className = 'btn-del';
      delBtn.innerHTML = '🗑';
      delBtn.title = '삭제';
      delBtn.addEventListener('click', async () => {
        if (!confirm(`"${item.caption}" 을 삭제할까요?`)) return;
        delBtn.disabled = true;
        try {
          if (item.image_url) {
            const path = decodeURIComponent(item.image_url.split('/gallery-images/').pop());
            if (path) await sb.storage.from('gallery-images').remove([path]);
          }
          const { error } = await sb.from('gallery').delete().eq('id', item.id);
          if (error) throw error;
          row.remove();
          toast('삭제했어요 🗑');
          initGallery();
        } catch(e) {
          toast('삭제 중 오류가 났어요 😅');
          delBtn.disabled = false;
        }
      });

      row.append(thumb, info, delBtn);
      list.appendChild(row);
    });
  } catch(e) {
    list.innerHTML = '<div class="gallery-empty" style="color:#e00">불러오기 실패</div>';
    console.error(e);
  }
}

function adjustCnt(delta, el) {
  const m = el.textContent.match(/\d+/);
  const n = m ? parseInt(m[0]) + delta : 0;
  el.textContent = `대기 중인 게시물: ${n}개`;
  if (n <= 0) document.getElementById('pending-list').innerHTML =
    '<div style="color:#888;font-size:13px;text-align:center;padding:24px">대기 중인 게시물이 없어요 ✅</div>';
}

// ══════════════════════════════════════════════
// 이미지 압축 (Canvas API)
// ══════════════════════════════════════════════
function compressImage(file, maxPx = 1280, quality = 0.82) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let { width: w, height: h } = img;
        if (w > maxPx || h > maxPx) {
          if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
          else        { w = Math.round(w * maxPx / h); h = maxPx; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(blob => {
          resolve(new File([blob], file.name.replace(/\.[^.]+$/, '.jpg'), { type: 'image/jpeg' }));
        }, 'image/jpeg', quality);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ══════════════════════════════════════════════
// 오류 메시지 해석
// ══════════════════════════════════════════════
function friendlyError(e) {
  const msg = (e?.message || e?.error_description || String(e)).toLowerCase();
  if (msg.includes('row-level security') || msg.includes('rls'))
    return 'Supabase 보안 정책 설정이 필요해요. SQL Editor에서 정책을 추가해주세요.';
  if (msg.includes('bucket') || msg.includes('not found'))
    return '저장소 버킷을 찾을 수 없어요. post-images 버킷이 있는지 확인해주세요.';
  if (msg.includes('file size') || msg.includes('payload too large'))
    return '파일이 너무 커요. 더 작은 사진을 선택해주세요.';
  if (msg.includes('network') || msg.includes('fetch'))
    return '인터넷 연결을 확인해주세요.';
  if (msg.includes('duplicate') || msg.includes('unique'))
    return '이미 올라간 파일이에요.';
  return '오류가 났어요. 잠시 후 다시 시도해주세요.';
}

function initLightbox() {
  const lb     = document.getElementById('lightbox');
  const lbImg  = document.getElementById('lightbox-img');
  const lbClose = document.getElementById('lightbox-close');

  function open(src) { lbImg.src = src; lb.classList.add('open'); }
  function close()   { lb.classList.remove('open'); lbImg.src = ''; }

  lbClose.addEventListener('click', close);
  lb.addEventListener('click', e => { if (e.target === lb) close(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });

  window._lightboxOpen = open;
}
